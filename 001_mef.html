<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
:root{
  --white:#FFFFFF; --ink:#333333; --red:#E60012; --orange:#EF8200;
  --orange-light:#FDF0E0; --grey:#888888; --grey-light:#D9D9D9; --bg:#FFFFFF;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,sans-serif;
     color:var(--ink); background:var(--bg); font-size:14px; line-height:1.6;}
header{border-bottom:3px solid var(--ink); padding:14px 20px 10px; display:flex; flex-wrap:wrap; align-items:baseline; gap:10px;}
.brand{font-size:26px; font-weight:800; letter-spacing:.06em;}
.brand-sub{font-size:12px; color:var(--grey);}
.badge{font-size:11px; border:1px solid var(--ink); padding:1px 8px; border-radius:2px;}
.auth-area{margin-left:auto; font-size:12px; color:var(--grey);}
nav{display:flex; flex-wrap:wrap; border-bottom:1px solid var(--grey-light); padding:0 12px; background:var(--white); position:sticky; top:0; z-index:5;}
nav button{appearance:none; border:none; background:none; font:inherit; font-size:13px; padding:10px 14px; cursor:pointer; color:var(--grey); border-bottom:3px solid transparent;}
nav button.active{color:var(--ink); font-weight:700; border-bottom-color:var(--red);}
main{max-width:1180px; margin:0 auto; padding:18px 16px 60px;}
h2{font-size:17px; margin:20px 0 8px; padding-left:10px; border-left:5px solid var(--ink);}
h3{font-size:14px; margin:16px 0 6px; color:var(--ink);}
p.lead{font-size:12px; color:var(--grey); margin-bottom:10px;}
table{border-collapse:collapse; width:100%; margin:8px 0 4px; font-size:13px;}
th,td{border:1px solid var(--grey-light); padding:5px 8px; text-align:right; vertical-align:top;}
th{background:#F5F5F5; font-weight:700; text-align:center;}
td.l, th.l{text-align:left;}
.city-head{font-weight:700;}
.chip{display:inline-block; font-size:11px; padding:0 6px; border-radius:2px; margin-left:6px; white-space:nowrap; border:1px solid var(--grey-light);}
.chip.s2 {background:var(--ink); color:var(--white); border-color:var(--ink);}
.chip.s1 {background:var(--grey-light); color:var(--ink);}
.chip.s0 {background:var(--white); color:var(--grey);}
.chip.sm1{background:var(--orange-light); color:var(--ink); border-color:var(--orange);}
.chip.sm2{background:var(--orange); color:var(--white); border-color:var(--orange);}
.chip.na {background:var(--white); color:var(--grey); border-style:dashed;}
.chip.ref{background:var(--white); color:var(--grey);}
.dev{font-size:11px; color:var(--grey); display:block;}
.note-box{border:1px solid var(--grey-light); border-left:4px solid var(--orange); background:#FDFBF8; padding:10px 12px; font-size:12px; margin:10px 0;}
.note-box.plain{border-left-color:var(--grey);}
.flag{display:inline-block; font-size:11px; color:var(--white); background:var(--grey); padding:0 6px; border-radius:2px; margin-right:4px;}
.suff{display:flex; gap:14px; flex-wrap:wrap; margin:8px 0;}
.suff .card{border:1px solid var(--grey-light); padding:8px 12px; min-width:200px; font-size:12px;}
.suff .bar{height:6px; background:var(--grey-light); border-radius:3px; overflow:hidden; margin:4px 0;}
.suff .bar>span{display:block; height:100%; background:var(--ink);}
.suff .miss{color:var(--grey); font-size:11px;}
.legend{font-size:11px; color:var(--grey); margin:6px 0 14px;}
.btn{appearance:none; font:inherit; font-size:13px; padding:7px 16px; border:1px solid var(--ink); background:var(--white); color:var(--ink); cursor:pointer; border-radius:2px;}
.btn.primary{background:var(--red); border-color:var(--red); color:var(--white);}
.btn:disabled{opacity:.45; cursor:default;}
input[type=email],input[type=password],select{font:inherit; font-size:13px; padding:6px 8px; border:1px solid var(--grey-light); border-radius:2px;}
.diag-item{border:1px solid var(--grey-light); padding:10px 12px; margin:8px 0; font-size:13px;}
.diag-item .res{margin-top:6px; font-size:12px; white-space:pre-wrap;}
.res.pass{color:var(--ink); font-weight:700;}
.res.fail{color:var(--red); font-weight:700;}
.res.warn{color:var(--orange); font-weight:700;}
footer{max-width:1180px; margin:0 auto; padding:14px 16px 40px; font-size:11px; color:var(--grey); border-top:1px solid var(--grey-light);}
.tab-pane{display:none;} .tab-pane.show{display:block;}
.sr{font-size:11px; color:var(--grey);}
.qual-item{border:1px solid var(--grey-light); margin:12px 0; padding:12px 14px;}
.qual-item h4{font-size:14px; margin-bottom:2px;}
.axis-badge{display:inline-block; font-size:11px; padding:0 7px; border-radius:2px; margin-left:8px; vertical-align:middle;}
.axis-badge.cap{background:var(--ink); color:var(--white);}
.axis-badge.urg{background:var(--orange); color:var(--white);}
.axis-badge.syn{background:var(--grey); color:var(--white);}
.axis-badge.w2{background:var(--white); color:var(--ink); border:1px solid var(--ink);}
.qual-src{font-size:11px; color:var(--grey); margin-bottom:6px;}
.anchor{display:block; padding:5px 8px; border:1px solid var(--grey-light); border-radius:2px; margin:4px 0; cursor:pointer; font-size:13px;}
.anchor input{margin-right:8px;}
.anchor.current{border-color:var(--ink); background:#F5F5F5;}
.qual-form{margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.qual-form input[type=text]{flex:1; min-width:220px; font:inherit; font-size:13px; padding:6px 8px; border:1px solid var(--grey-light); border-radius:2px;}
.eff{font-size:12px; margin:4px 0 8px;}
.eff b{font-size:15px;}
.hist{font-size:12px; margin-top:8px; border-top:1px dashed var(--grey-light); padding-top:6px;}
.hist table{font-size:12px;}
.hist .del{color:var(--grey); text-decoration:line-through;}
.linklike{background:none; border:none; color:var(--red); cursor:pointer; font-size:12px; padding:0; text-decoration:underline;}
.savemsg{font-size:12px;}
.savemsg.ok{color:var(--ink); font-weight:700;}
.savemsg.err{color:var(--red); font-weight:700;}
details.histbox summary{cursor:pointer; font-size:12px; color:var(--grey);}
.mx-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start;}
.mx-chart{flex:1 1 520px; min-width:320px; border:1px solid var(--grey-light); padding:10px;}
.mx-side{flex:1 1 340px; min-width:300px;}
.wtable input[type=number]{width:64px; font:inherit; font-size:13px; padding:3px 5px; border:1px solid var(--grey-light); border-radius:2px; text-align:right;}
.wsum-ok{color:var(--ink); font-weight:700;} .wsum-ng{color:var(--red); font-weight:700;}
.quad-name{font-size:12px; font-weight:700;}
.sens-hit{border-left:4px solid var(--orange); background:var(--orange-light); padding:6px 10px; margin:4px 0; font-size:12px;}
.sens-ok{border-left:4px solid var(--grey-light); padding:6px 10px; margin:4px 0; font-size:12px; color:var(--grey);}
.prov{color:var(--orange); font-weight:700;}
@media (max-width:700px){ th,td{padding:4px 5px; font-size:12px;} .brand{font-size:22px;} }
</style>
</head>
<body>
<header>
  <span class="brand">MEF</span>
  <span class="brand-sub">市町村評価共通フレームワーク｜包括委託・コンセッション 提案類型分類</span>
  <span class="badge">基準:令和5年度決算</span>
  <span class="auth-area" id="authStatus">未ログイン(閲覧はどなたでも可・入力機能はログイン後)</span>
</header>
<nav id="nav">
  <button data-tab="gen" class="active">① 一般会計</button>
  <button data-tab="water">② 水道</button>
  <button data-tab="sewer">② 下水道</button>
  <button data-tab="qual">③④ 入力</button>
  <button data-tab="matrix">マトリクス・感度</button>
  <button data-tab="ts">時系列 R1–R5</button>
  <button data-tab="notes">注記・出典</button>
  <button data-tab="diag">診断・ログイン</button>
</nav>
<main>
  <div id="loading">静的データを読み込んでいます…</div>

  <section id="pane-gen" class="tab-pane"></section>
  <section id="pane-water" class="tab-pane"></section>
  <section id="pane-sewer" class="tab-pane"></section>
  <section id="pane-qual" class="tab-pane"></section>
  <section id="pane-matrix" class="tab-pane"></section>
  <section id="pane-ts" class="tab-pane"></section>
  <section id="pane-notes" class="tab-pane"></section>
  <section id="pane-diag" class="tab-pane"></section>
</main>
<footer>
  本ツールのスコアは「類似団体平均比の乖離率方式(±5%・±15%で5段階)」による分類の論理妥当性の検証装置であり、意思決定の代替ではありません(指標定義書1章・8章)。
  ①の類型平均は5県237団体による暫定値です。サウンディングの受容性・競合動向・個別の人的関係は本ツールの評価対象外です。
</footer>

<script>
"use strict";
/* ============================================================
   MEF 001_mef.html  マイルストーン(1): 静的①②ダッシュボード+診断
   設計正本: 指標定義書v1.2 / 引き継ぎ指示 / 開発環境引き継ぎ書
   ============================================================ */

const CITIES = [
  {key:"kosai",       name:"湖西市",   pref:"静岡県", genGroup:"Ⅱ-2", genAvgKey:"avg_II2"},
  {key:"nakatsugawa", name:"中津川市", pref:"岐阜県", genGroup:"Ⅱ-2", genAvgKey:"avg_II2"},
  {key:"kuwana",      name:"桑名市",   pref:"三重県", genGroup:"Ⅲ-2", genAvgKey:"avg_III2"}
];

let D = null;          // 静的データ
let sb = null;         // Supabase クライアント(ログイン用・セッション保持)
let session = null;

/* ---------- スコア計算(定義書3.3: 乖離率方式) ---------- */
let T1 = 5, T2 = 15; // ±5% / ±15% (デフォルト。感度分析で一時変更されるためlet)
function devRate(v, avg){
  if (v===null || v===undefined || avg===null || avg===undefined) return null;
  if (avg === 0) return null; // 平均0は乖離率定義不能
  return (v - avg) / Math.abs(avg);
}
// higherIsBetter: 値が大きいほど良好(受入能力+)ならtrue
function score5(v, avg, higherIsBetter){
  const d = devRate(v, avg);
  if (d===null) return {s:null, d:null};
  const a = higherIsBetter ? d : -d;
  const pct = a*100;
  let s = 0;
  if (pct >  T2) s = 2; else if (pct >  T1) s = 1;
  else if (pct < -T2) s = -2; else if (pct < -T1) s = -1;
  return {s, d};
}
function chip(sc, opts){
  opts = opts||{};
  if (opts.na) return '<span class="chip na">'+(opts.naLabel||'該当なし')+'</span>';
  if (opts.ref) return '<span class="chip ref">参考</span>';
  if (sc===null || sc===undefined || sc.s===null) return '<span class="chip na">判定不能</span>';
  const map = {"2":["s2","+2 優位"],"1":["s1","+1"],"0":["s0","0 平均並み"],"-1":["sm1","−1"],"-2":["sm2","−2 要注意"]};
  const m = map[String(sc.s)];
  const dev = (sc.d===null)?'':'<span class="dev">乖離 '+(sc.d>=0?'+':'')+(sc.d*100).toFixed(1)+'%</span>';
  return '<span class="chip '+m[0]+'">'+m[1]+'</span>'+dev;
}
function fmt(v, digits){
  if (v===null||v===undefined) return '−';
  return Number(v).toLocaleString('ja-JP',{maximumFractionDigits:(digits===undefined?2:digits)});
}

/* ---------- ① 一般会計 ---------- */
// 定義書4章: 指標→{dir:'high'|'low'|'urgency'|'ref'|'info'}
const GEN_DEF = {
  "財政力指数":{dir:"high"}, "経常収支比率":{dir:"low"}, "実質公債費比率":{dir:"low"},
  "将来負担比率":{dir:"low", special:"fw"}, "地方交付税依存度":{dir:"low"},
  "地方税(人口1人当たり)":{dir:"high"}, "地方債現在高(同上)":{dir:"low"},
  "国勢調査人口増減率(H27→R2)":{dir:"urgency"},
  "職員数(人口千人当たり)":{dir:"ref"},
  "住民基本台帳人口(R6.1.1)":{dir:"info"},
  "将来推計人口指数(2050/2020)":{dir:"missing"}
};
function renderGen(){
  const el = document.getElementById('pane-gen');
  let h = '<h2>① 一般会計(令和5年度決算)</h2>';
  h += '<p class="lead">比較基準:5県(岐阜・静岡・愛知・三重・長野)237団体の同一市町村類型平均(暫定。将来「類似団体別市町村財政指数表」の正式平均に差替予定)。湖西・中津川=Ⅱ-2平均(n=34)、桑名=Ⅲ-2平均(n=17)。</p>';
  h += suffCards('gen');
  h += '<table><tr><th class="l">指標</th><th>単位</th>';
  CITIES.forEach(c=>{ h += '<th class="city-head">'+c.name+'<br><span class="sr">'+c.genGroup+'</span></th>'; });
  h += '<th>Ⅱ-2平均</th><th>Ⅲ-2平均</th></tr>';
  let fwNote = false;
  D.gen_account.forEach(r=>{
    const def = GEN_DEF[r.indicator] || {dir:"ref"};
    h += '<tr><td class="l">'+r.indicator+(def.dir==="ref"?' <span class="sr">(参考指標)</span>':'')
       + (def.dir==="urgency"?' <span class="sr">(切迫度側)</span>':'')+'</td><td>'+(r.unit||'')+'</td>';
    CITIES.forEach(c=>{
      const raw = r[c.key];
      const avg = r[c.genAvgKey];
      let cell = '';
      if (def.dir==="missing"){ cell = '<span class="chip na">欠測(社人研から取得予定)</span>'; }
      else if (def.special==="fw" && (raw===null || typeof raw === 'string')){
        // 将来負担比率「算定なし」: 最良(+2)扱い+注記(本スレッド確定事項)
        cell = fmt(null)+' <span class="chip s2">+2 算定なし※</span><span class="dev">比率算定対象外</span>';
        fwNote = true;
      }
      else if (typeof raw === 'string'){ cell = raw; }
      else if (def.dir==="info"){ cell = fmt(raw,0); }
      else if (def.dir==="ref"){ cell = fmt(raw)+' <span class="chip ref">参考</span>'; }
      else if (def.dir==="urgency"){
        // 人口増減率: マイナス値基準のため乖離率は|平均|基準・減少が大きいほど切迫
        const d = devRate(raw, avg);
        let lbl = '<span class="chip na">判定不能</span>';
        if (d!==null){
          const pct = -d*100; // 平均より減少が大きい(値が小さい)ほど正
          let s=0; if(pct>T2)s=2; else if(pct>T1)s=1; else if(pct<-T2)s=-2; else if(pct<-T1)s=-1;
          const m={"2":["sm2","切迫 大"],"1":["sm1","切迫 やや大"],"0":["s0","平均並み"],"-1":["s1","緩やか"],"-2":["s2","緩やか+"]}[String(s)];
          lbl = '<span class="chip '+m[0]+'">'+m[1]+'</span><span class="dev">平均比 '+(d>=0?'+':'')+(d*100).toFixed(1)+'%</span>';
        }
        cell = fmt(raw)+' '+lbl;
      }
      else {
        cell = fmt(raw)+' '+chip(score5(raw, avg, def.dir==="high"));
      }
      h += '<td>'+cell+'</td>';
    });
    h += '<td>'+ (typeof r.avg_II2==='number'?fmt(r.avg_II2):'−') +'</td><td>'+ (typeof r.avg_III2==='number'?fmt(r.avg_III2):'−') +'</td></tr>';
  });
  h += '</table>';
  h += legend();
  if (fwNote){
    h += '<div class="note-box"><b>※将来負担比率「算定なし」の扱い(丁寧な補記):</b> '
      +'中津川市の将来負担比率は「−(算定なし)」です。これは欠測ではなく、将来負担額が充当可能財源等を下回るため制度上比率を算定しない状態を指し、財政健全性としては良好側のシグナルです。本ツールではスコア+2(最良)として扱い、データ充足率には「入力済み」として算入します。'
      +'ただし厳密には「比率が基準未満で小さい」こと以上の情報(実際の余裕幅)は持たないため、断定的な優劣比較には用いず、この注記を常に併読してください。なお5県237団体では149団体が算定なしであり、算定なし自体は珍しい状態ではありません。</div>';
  }
  h += '<div class="note-box plain"><b>注記:</b> '+(D.meta.gen_baseline_note||'')+'</div>';
  el.innerHTML = h;
}

/* ---------- ② 水道 ---------- */
// 定義書5.1: スコア対象と評価方向。avg3=3か年平均採用
const WATER_DEF = {
  "①経常収支比率":{scored:true, dir:"high"},
  "②累積欠損金比率":{scored:false},
  "③流動比率":{scored:false},
  "④企業債残高対給水収益比率":{scored:true, dir:"low"},
  "⑤料金回収率":{scored:true, dir:"high", avg3:"料金回収率（R3-R5平均）"},
  "⑥給水原価":{scored:false},
  "⑦施設利用率":{scored:false},
  "⑧有収率":{scored:true, dir:"high", sflag:true},
  "①有形固定資産減価償却率":{scored:true, dir:"low"},
  "②管路経年化率":{scored:true, dir:"low"},
  "③管路更新率":{scored:true, dir:"high", avg3:"管路更新率（R3-R5平均）"}
};
function renderWater(){
  const el = document.getElementById('pane-water');
  let h = '<h2>② 水道事業(末端給水・令和5年度決算)</h2>';
  h += '<p class="lead">比較基準:経営比較分析表の類似団体平均(湖西A4/中津川A4/桑名A3)。料金回収率・管路更新率はR3-R5の3か年平均でスコア判定(定義書3.3。比較対象の類似平均はR5単年値のため近似)。スコア対象外の指標は「参考」表示。</p>';
  h += suffCards('water');
  h += '<table><tr><th class="l">指標</th><th>単位</th>';
  CITIES.forEach(c=>{ h+='<th class="city-head">'+c.name+'</th>'; });
  h += '</tr>';
  D.water.rows.forEach(r=>{
    const def = WATER_DEF[r.indicator]||{scored:false};
    h += '<tr><td class="l">'+r.indicator+(def.avg3?' <span class="sr">※3か年平均で判定</span>':'')+'</td><td>'+(r.unit||'')+'</td>';
    CITIES.forEach(c=>{
      const cell = r[c.key];
      let v = cell.value, avg = cell.peer_avg, disp;
      if (def.avg3 && D.water.avg3y[def.avg3]){
        const v3 = D.water.avg3y[def.avg3][c.key];
        disp = fmt(v)+' <span class="sr">/3y '+fmt(v3)+'</span> '+(def.scored?chip(score5(v3,avg,def.dir==="high")):'<span class="chip ref">参考</span>');
      } else {
        disp = fmt(v)+' '+(def.scored?chip(score5(v,avg,def.dir==="high")):'<span class="chip ref">参考</span>');
      }
      h += '<td>'+disp+'<span class="dev">類似平均 '+fmt(avg)+'</span></td>';
    });
    h += '</tr>';
  });
  h += '</table>'+legend();
  h += '<h3>構造フラグ(スコアと分離・注記表示/定義書3.4)</h3>';
  h += '<div class="note-box plain">'
    +'<span class="flag">簡易水道統合</span>中津川市:H29に旧簡易水道23事業等を統合。山間部小規模系統の包含により有収率・給水原価が構造的に悪化(給水人口密度296人/km²。湖西1,008・桑名1,010)。<br>'
    +'<span class="flag">老朽化起因</span>桑名市:人口密度は高いが管路経年化率36.09%(類似平均24.49%)・有収率80.01%。老朽化起因の漏水が示唆され、構造要因ではなく更新需要のシグナル。<br>'
    +'<span class="flag">繰入嵩上げ</span>中津川市水道の経常収支比率は基準外繰入による嵩上げに注意(R6は105.15%だが基準外繰入増加による。繰出金の基準内外データは取得予定)。</div>';
  el.innerHTML = h;
}

/* ---------- ② 下水道 ---------- */
const SEWER_DEF = {
  "①経常収支比率":{scored:true, dir:"high"},

function ts3y(cityName, business, indicatorHead){
  const hit = D.timeseries.find(t=>t.city===cityName && t.business===business && t.indicator.indexOf(indicatorHead)===0);
  return hit ? hit.avg_R3R5 : null;
}

  h += suffCards('sewer');
  D.sewer.blocks.forEach(block=>{
    h += '<h3>'+block.title+'</h3>';
    h += '<table><tr><th class="l">指標</th><th>単位</th>';
    CITIES.forEach(c=>{ h+='<th class="city-head">'+c.name+'</th>'; });
    h += '</tr>';
    block.rows.forEach(r=>{
      const def = SEWER_DEF[r.indicator]||{scored:false};
      h += '<tr><td class="l">'+r.indicator+(def.avg3?' <span class="sr">※3か年平均で判定</span>':'')+'</td><td>'+(r.unit||'')+'</td>';
      CITIES.forEach(c=>{
        const cell = r[c.key];
        if (cell.na){
          const lbl = (c.key==='kuwana' && block.title==='農業集落排水') ? 'R5欠測(R6.3.31法適用化)' : '該当なし';
          h += '<td>'+chip(null,{na:true,naLabel:lbl})+'</td>'; return;
        }
        let v = cell.value, avg = cell.peer_avg, extra='', scObj=null, refOnly=!def.scored;
        // 湖西・下水道の企業債: 分析表0は誤報告→補正値を使用(指示書確定事項)
        if (r.indicator==='④企業債残高対事業規模比率' && c.key==='kosai'){
          if (block.title==='公共下水道'){
            const fx = D.sewer.kosai_bond_correction;
            v = fx.corrected_ratio_pct; avg = fx.peer_avg_pct;
            extra = '<span class="dev">分析表値0→決算書ベース補正 約'+fmt(fx.corrected_ratio_pct,0)+'%を採用※</span>';
          } else if (block.title==='特定環境保全公共下水道'){
            h += '<td>'+chip(null,{na:true,naLabel:'公共側と一体経理(補正参照)'})+'<span class="dev">分析表値0(按分報告)</span></td>'; return;
          }
        }
        if (def.avg3){
          const v3 = ts3y(c.name, TS_BIZ[block.title], '⑤経費回収率') ?? ts3y(c.name, TS_BIZ[block.title], '経費回収率');
          if (v3!==null){ scObj = score5(v3,avg,def.dir==="high"); extra += '<span class="sr"> /3y '+fmt(v3)+'</span>'; }
          else scObj = score5(v,avg,def.dir==="high");
        } else if (def.scored){
          scObj = score5(v,avg,def.dir==="high");
        }
        let caveat = '';
        if (def.zeroCaveat && v===0){ caveat='<span class="dev">値0は経過年数等のデータ未整備に起因する場合あり(③3-1と併読)</span>'; }
        h += '<td>'+fmt(v)+extra+' '+(refOnly?'<span class="chip ref">参考</span>':chip(scObj))+'<span class="dev">類似平均 '+fmt(avg)+'</span>'+caveat+'</td>';
      });

    });
    h += '</table>';
  });
  h += legend();
  const fx = D.sewer.kosai_bond_correction;
  h += '<div class="note-box"><b>※湖西市下水道・企業債残高の補正(検証済):</b> '+fx.issue+'。'
    +'企業債残高合計 '+fmt(fx.debt_total_yen/1e8,1)+'億円のうち一般会計負担見込 '+fmt(fx.debt_ga_share_yen/1e8,1)+'億円を控除した '+fmt(fx.debt_net_yen/1e8,1)+'億円を使用料収入 '+fmt(fx.sewer_fee_revenue_yen/1e8,1)+'億円で除した概算比率 約'+fmt(fx.corrected_ratio_pct,0)+'%をスコア計算に使用。'+fx.note+'</div>';

  el.innerHTML = h;

/* ---------- データ充足率(定義書3.5: 軸ごと・市ごと) ---------- */
const SUFF_DEF = {
  gen:  {total:9, label:"①一般会計", missing:["将来推計人口指数(社人研・取得予定)"]},
  water:{total:9, label:"②水道",     missing:["繰出金の基準内外(決算状況調から取得予定)","技術職員数・年齢構成(取得予定)"]},
  sewer:{total:8, label:"②下水道",   missing:["有収率(処理水量ベース・未取得)","繰出金の基準内外(取得予定)"]}
};
function suffCards(axis){
  const def = SUFF_DEF[axis];
  const have = def.total - def.missing.length;
  const pct = Math.round(have/def.total*1000)/10;
  const provisional = pct < 70;
  let h = '<div class="suff"><div class="card"><b>データ充足率('+def.label+'・3市共通)</b> '
    + pct.toFixed(1)+'%('+have+'/'+def.total+'指標)'
    + (provisional?' <span class="chip sm2">暫定</span>':' <span class="chip s1">確定(閾値70%以上)</span>')
    + '<div class="bar"><span style="width:'+pct+'%"></span></div>'
    + '<div class="miss">欠測:'+def.missing.join(' / ')+'</div></div></div>';
  return h;
}
function legend(){
  return '<p class="legend">スコア凡例:類似団体平均比の乖離率を評価方向を揃えて5段階化(+15%超=+2優位/+5〜15%=+1/±5%以内=0/−5〜−15%=−1/−15%未満=−2要注意)。'
    +'「参考」=定義書のスコア対象外指標(累積欠損金・流動比率・原価・施設利用率・水洗化率等)。財務指標の強調色にレッドは使用しない(CE配色規律)。</p>';
}

/* ---------- 時系列 ---------- */
function renderTs(){
  const el = document.getElementById('pane-ts');
  const combos = [];
  D.timeseries.forEach(t=>{
    const k = t.city+'|'+t.business;
    if (!combos.includes(k)) combos.push(k);
  });
  let h = '<h2>時系列 R1–R5(参考ビュー)</h2>'
    +'<p class="lead">基準年度統一(R5)の外側の参考情報です。スコア計算には使用しません(R6以降の切迫シグナルは③の定性入力で反映/定義書3.1)。桑名市はR1値なし(R6分析表の掲載期間による。3か年平均には影響なし)。</p>'
    +'<label>市・事業: <select id="tsSel">';
  combos.forEach(k=>{ const [c,b]=k.split('|'); h+='<option value="'+k+'">'+c+' '+b+'</option>'; });
  h += '</select></label><div id="tsTable"></div>';
  el.innerHTML = h;
  const draw = ()=>{
    const [city,biz] = document.getElementById('tsSel').value.split('|');
    let t = '<table><tr><th class="l">指標</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th><th>R3-R5平均</th></tr>';
    D.timeseries.filter(x=>x.city===city&&x.business===biz).forEach(x=>{
      t += '<tr><td class="l">'+x.indicator+'</td><td>'+fmt(x.R1)+'</td><td>'+fmt(x.R2)+'</td><td>'+fmt(x.R3)+'</td><td>'+fmt(x.R4)+'</td><td>'+fmt(x.R5)+'</td><td>'+fmt(x.avg_R3R5)+'</td></tr>';
    });
    t += '</table>';
    if (city==='桑名市' && biz==='公共下水道'){
      t += '<div class="note-box plain">桑名市公共下水道の施設利用率はR4に算定方法修正(単独+流域関連の合算に変更)。R2-R3値はR4以降と非連続。</div>';
    }
    document.getElementById('tsTable').innerHTML = t;
  };
  document.getElementById('tsSel').addEventListener('change', draw);
  draw();
}

async function saveQual(code){
  const msg = document.getElementById('msg-'+code);
  msg.textContent=''; msg.className='savemsg';
  const def = QUAL_DEF.find(d=>d.code===code);
  const sel = document.querySelector('input[name="anc-'+code+'"]:checked');
  const ev  = document.getElementById('ev-'+code).value.trim();
  const nt  = document.getElementById('nt-'+code).value.trim();
  if (!sel){ msg.textContent='アンカーを選択してください'; msg.className='savemsg err'; return; }
  const lv = parseInt(sel.value,10);
  if (lv<0 || lv>def.max){ msg.textContent='点数が範囲外です(0〜'+def.max+')'; msg.className='savemsg err'; return; }
  if (!ev){ msg.textContent='根拠資料名は必須です(定義書9.2)'; msg.className='savemsg err'; return; }
  msg.textContent='保存中…';
  const {error} = await sb.from('qualitative_inputs').insert({
    municipality_key: QUAL_KEYS[qualCity], item_code: code, level: lv,
    evidence: ev, note: nt||null, entered_by: session.user?.email||null
  });
  if (error){ msg.textContent='保存失敗: '+error.message; msg.className='savemsg err'; return; }
  msg.textContent='保存しました'; msg.className='savemsg ok';
  loadQual();
}

// 下水道: 処理区域内人口による規模加重(定義書5.3)
function sewerWeights(cityName){
  const map={"公共下水道":"公共下水道","特定環境保全公共下水道":"特環公共下水道","農業集落排水":"農業集落排水","個別排水処理":"個別排水処理"};
  const w={};
  D.basic_info.forEach(b=>{
    if (b.entity.indexOf(cityName)!==0) return;
    Object.keys(map).forEach(bt=>{
      if (b.entity.indexOf(map[bt])>=0 && typeof b.served_population==='number') w[bt]=b.served_population;
    });
  });
  return w;
}
function sewerAggScore(cKey, cityName, indicator, dirHigh, use3y){
  const w = sewerWeights(cityName);
  let num=0, den=0;
  D.sewer.blocks.forEach(block=>{
    const row = block.rows.find(r=>r.indicator===indicator);
    if (!row) return;
    const cell = row[cKey];
    if (!cell || cell.na) return;
    let v=cell.value, avg=cell.peer_avg;
    if (indicator==='④企業債残高対事業規模比率' && cKey==='kosai'){
      if (block.title==='公共下水道'){ v=D.sewer.kosai_bond_correction.corrected_ratio_pct; avg=D.sewer.kosai_bond_correction.peer_avg_pct; }
      else return; // 特環は一体経理につき除外
    }
    if (use3y){
      const v3 = ts3y(cityName, TS_BIZ[block.title], '⑤経費回収率') ?? ts3y(cityName, TS_BIZ[block.title], '経費回収率');
      if (v3!==null) v=v3;
    }
    const sc = score5(v, avg, dirHigh);
    if (sc.s===null) return;
    const bw = w[block.title]||0;
    if (bw<=0) return;
    num += sc.s*bw; den += bw;
  });
  return den>0 ? num/den : null;
}
// ①②の構成要素スコア(良好度ベース s∈[-2,2]の連続値)を市ごとに算出
function cityComponents(c){
  const cKey=c.key, cityName=c.name;
  // ②水道
  function wRow(ind){ return D.water.rows.find(r=>r.indicator===ind); }
  function wScore(ind, dirHigh, avg3key){
    const r=wRow(ind); if(!r) return null;
    let v=r[cKey].value, avg=r[cKey].peer_avg;
    if (avg3key && D.water.avg3y[avg3key]) v=D.water.avg3y[avg3key][cKey];
    const sc=score5(v,avg,dirHigh); return sc.s;
  }
  const finance = meanArr([
    wScore('⑤料金回収率',true,'料金回収率（R3-R5平均）'),
    wScore('①経常収支比率',true),
    sewerAggScore(cKey,cityName,'⑤経費回収率',true,true),
    sewerAggScore(cKey,cityName,'①経常収支比率',true,false)
  ]);
  const aging = meanArr([
    wScore('①有形固定資産減価償却率',false),
    wScore('②管路経年化率',false),
    wScore('③管路更新率',true,'管路更新率（R3-R5平均）'),
    sewerAggScore(cKey,cityName,'①有形固定資産減価償却率',false,false),
    sewerAggScore(cKey,cityName,'②管渠老朽化率',false,false),
    sewerAggScore(cKey,cityName,'③管渠改善率',true,false)
  ]);
  const capex = meanArr([
    wScore('④企業債残高対給水収益比率',false),
    sewerAggScore(cKey,cityName,'④企業債残高対事業規模比率',false,false)
  ]);
  // ①財政指標(7指標。将来負担比率「算定なし」=+2)
  const genMap={"財政力指数":true,"経常収支比率":false,"実質公債費比率":false,"将来負担比率":false,
                "地方交付税依存度":false,"地方税(人口1人当たり)":true,"地方債現在高(同上)":false};
  const fis=[];
  D.gen_account.forEach(r=>{
    if (!(r.indicator in genMap)) return;
    const raw=r[cKey], avg=r[c.genAvgKey];
    if (r.indicator==='将来負担比率' && (raw===null||typeof raw==='string')){ fis.push(2); return; }
    if (typeof raw!=='number') return;
    const sc=score5(raw,avg,genMap[r.indicator]); if(sc.s!==null) fis.push(sc.s);
  });
  const fiscal = meanArr(fis);
  // ①人口動態(切迫方向のスコアをそのまま保持: +が切迫)
  const popRow = D.gen_account.find(r=>r.indicator==='国勢調査人口増減率(H27→R2)');
  let popUrg = null;
  if (popRow && typeof popRow[cKey]==='number'){
    const d = devRate(popRow[cKey], popRow[c.genAvgKey]);
    if (d!==null){ const pct=-d*100; popUrg = pct>T2?2 : pct>T1?1 : pct<-T2?-2 : pct<-T1?-1 : 0; }
  }
  return {finance, aging, capex, fiscal, popUrg};
}

  const eff={kosai:{},nakatsugawa:{},kuwana:{}};
  const inv={}; Object.keys(QUAL_KEYS).forEach(k=>inv[QUAL_KEYS[k]]=k);
  (data||[]).forEach(r=>{
    const ck=inv[r.municipality_key]; if(!ck||r.is_deleted) return;
    if (!(r.item_code in eff[ck])) eff[ck][r.item_code]=r.level;
  });
  return eff;
}
// 統合計算: weights(数値), t1,t2, qualEff → 市ごとの結果
function computeAll(w, t1, t2, qualEff){
  const T1s=T1, T2s=T2; T1=t1; T2=t2;
  const out={};
  CITIES.forEach(c=>{
    const comp = cityComponents(c);
    const q = qualEff[c.key]||{};
    // 切迫度
    const uComps = {
      w2_finance: comp.finance!==null? normUrg(comp.finance):null,
      w2_aging:   comp.aging!==null?   normUrg(comp.aging):null,
      w2_staff:   null, // 技術職員数 欠測
      w1_pop:     comp.popUrg!==null? (comp.popUrg+2)/4*100 : null,
      w3_signal:  meanArr([q['3-4']!==undefined? q['3-4']/3*100:null, q['3-5']!==undefined? q['3-5']/3*100:null])
    };
    // 受入能力
    const instItems=[['3-1',4,2],['3-2',3,2],['3-3',3,1],['3-7',3,1],['3-8',3,1]];
    let iN=0,iD=0; instItems.forEach(([code,max,iw])=>{ if(q[code]!==undefined){ iN+=q[code]/max*100*iw; iD+=iw; } });
    const cComps = {
      w1_fiscal:  comp.fiscal!==null? normGood(comp.fiscal):null,
      w3_inst:    iD>0? iN/iD : null,
      w3_politics:q['3-6']!==undefined? q['3-6']/3*100 : null,
      w2_capex:   comp.capex!==null? normGood(comp.capex):null
    };
    function axis(comps, weights){
      let n=0,d=0,cov=0,tot=0;
      Object.keys(weights).forEach(k=>{
        tot+=weights[k];
        if (comps[k]!==null && comps[k]!==undefined){ n+=comps[k]*weights[k]; d+=weights[k]; cov+=weights[k]; }
      });
      return {score: d>0? n/d : null, coverage: tot>0? cov/tot*100 : 0};
    }
    const U=axis(uComps, w.urgency), C=axis(cComps, w.capacity);
    const syn = meanArr([q['4-1'],q['4-2'],q['4-3']].map(v=>v!==undefined? v/3*100:null));
    const quad = (U.score===null||C.score===null)? null :
      (U.score>=50? (C.score>=50?'hh':'hl') : (C.score>=50?'lh':'ll'));
    out[c.key]={u:U.score, c:C.score, uCov:U.coverage, cCov:C.coverage, syn, quad,
                provisional:(U.coverage<70||C.coverage<70), comps:{u:uComps,c:cComps}};
  });
  T1=T1s; T2=T2s;
  return out;
}
/* 感度分析: 重み±10pt(項目単位)+偏差閾値の変動で象限・順位の変化を探索 */
function sensitivity(baseW, qualEff){
  const base = computeAll(baseW,5,15,qualEff);
  const hits=[]; const deltas=[-10,10];
  ['urgency','capacity'].forEach(ax=>{
    Object.keys(baseW[ax]).forEach(k=>{
      deltas.forEach(dl=>{
        const w = JSON.parse(JSON.stringify(baseW));
        w[ax][k]=Math.max(0, w[ax][k]+dl);
        const res = computeAll(w,5,15,qualEff);
        CITIES.forEach(c=>{
          const b=base[c.key], r=res[c.key];
          if (b.quad && r.quad && b.quad!==r.quad){
            hits.push({type:'quad', city:c.name, axis:ax, key:k, delta:dl,
              from:QUAD_NAMES[b.quad], to:QUAD_NAMES[r.quad]});
          }
        });
        // 順位入替(各軸)
        ['u','c'].forEach(dim=>{
          const bo=CITIES.map(c=>c.key).filter(k2=>base[k2][dim]!==null).sort((a,b2)=>base[b2][dim]-base[a][dim]).join('>');
          const ro=CITIES.map(c=>c.key).filter(k2=>res[k2][dim]!==null).sort((a,b2)=>res[b2][dim]-res[a][dim]).join('>');
          if (bo!==ro) hits.push({type:'rank', dim:(dim==='u'?'切迫度':'受入能力'), axis:ax, key:k, delta:dl});
        });
      });
    });
  });
  // 閾値感度(±5/±15 → 緩め/厳しめ)
  const thVariants=[[3,10],[7,20]];
  thVariants.forEach(([t1,t2])=>{
    const res=computeAll(baseW,t1,t2,qualEff);
    CITIES.forEach(c=>{
      const b=base[c.key], r=res[c.key];
      if (b.quad && r.quad && b.quad!==r.quad)
        hits.push({type:'thresh', city:c.name, t1,t2, from:QUAD_NAMES[b.quad], to:QUAD_NAMES[r.quad]});
    });
  });
  return {base, hits};
}
function wLabel(ax,k){ return DEFAULT_W[ax][k].label.split('(')[0]; }
async function renderMatrix(){
  const el = document.getElementById('pane-matrix');
  if (!sb){ el.innerHTML='<h2>マトリクス・感度分析</h2><div class="note-box">config.js が未設定のため利用できません。</div>'; return; }
  if (!session){
    el.innerHTML='<h2>マトリクス・感度分析</h2><div class="note-box">マトリクスは③④の入力値(機微情報を含む)を統合するため、ログインが必要です。「診断・ログイン」タブからログイン後、開き直してください。</div>'; return;
  }
  el.innerHTML='<h2>マトリクス・感度分析</h2><p class="lead">計算中…</p>';
  try{
    mxQualEff = await loadQualEff();
    if (!mxWeights){
      mxWeights = defaultWeightsNum();
      try{
        const {data} = await sb.from('weight_settings').select('payload').eq('is_default',true).limit(1);
        if (data && data.length){
          const p=data[0].payload;
          ['urgency','capacity'].forEach(ax=>Object.keys(mxWeights[ax]).forEach(k=>{
            if (p[ax] && p[ax][k] && typeof p[ax][k].weight==='number') mxWeights[ax][k]=p[ax][k].weight;
          }));
          mxRationale={urgency:p.urgency.rationale||RATIONALE_FALLBACK.urgency,
                       capacity:p.capacity.rationale||RATIONALE_FALLBACK.capacity,
                       synergy:(p.synergy&&p.synergy.rationale)||RATIONALE_FALLBACK.synergy};
        }
      }catch(e){/* フォールバック定数を使用 */}
    }
    drawMatrix();
  }catch(e){
    el.innerHTML='<h2>マトリクス・感度分析</h2><div class="note-box">③④の読取に失敗しました: '+esc(e.message)+'</div>';
  }
}
function drawMatrix(){
  const el = document.getElementById('pane-matrix');
  const sens = sensitivity(mxWeights, mxQualEff);
  const res = sens.base;
  let h='<h2>マトリクス・感度分析</h2>'
   +'<p class="lead">縦軸=切迫度、横軸=受入能力(各0〜100。50が高低の境界)、バブル=④シナジー。象限は提案類型への分類装置であり、切迫度が低いことを理由に提案を見送る判断には用いません(定義書2章)。欠測構成要素は重みを除外して再正規化し、軸カバレッジ70%未満は<span class="prov">暫定</span>表示。</p>';
  h+='<div class="mx-wrap"><div class="mx-chart"><canvas id="mxCanvas" height="420"></canvas><div id="mxNoChart"></div></div><div class="mx-side">';
  // 結果表
  h+='<table><tr><th class="l">市</th><th>切迫度</th><th>受入能力</th><th>④</th><th class="l">提案類型</th></tr>';
  CITIES.forEach(c=>{
    const r=res[c.key];
    h+='<tr><td class="l">'+c.name+(r.provisional?' <span class="prov">暫定</span>':'')+'</td>'
     +'<td>'+(r.u===null?'−':r.u.toFixed(1))+'<span class="dev">cov '+r.uCov.toFixed(0)+'%</span></td>'
     +'<td>'+(r.c===null?'−':r.c.toFixed(1))+'<span class="dev">cov '+r.cCov.toFixed(0)+'%</span></td>'
     +'<td>'+(r.syn===null?'未入力':r.syn.toFixed(0))+'</td>'
     +'<td class="l quad-name">'+(r.quad?QUAD_NAMES[r.quad]:'③未入力のため分類不能')+'</td></tr>';
  });
  h+='</table>';
  // 重み編集
  h+='<h3>重み(調整可・合計100推奨)</h3><table class="wtable">';
  ['urgency','capacity'].forEach(ax=>{
    h+='<tr><th class="l" colspan="2">'+(ax==='urgency'?'切迫度(縦軸)':'受入能力(横軸)')+' <button class="linklike" data-rat="'+ax+'">根拠</button></th></tr>';
    Object.keys(DEFAULT_W[ax]).forEach(k=>{
      h+='<tr><td class="l">'+DEFAULT_W[ax][k].label+'</td><td><input type="number" min="0" max="100" step="5" data-w="'+ax+'.'+k+'" value="'+mxWeights[ax][k]+'"></td></tr>';
    });
    const sum=Object.values(mxWeights[ax]).reduce((a,b)=>a+b,0);
    h+='<tr><td class="l sr">合計</td><td class="'+(sum===100?'wsum-ok':'wsum-ng')+'">'+sum+'</td></tr>';
  });
  h+='</table><div class="qual-form"><button class="btn primary" id="mxApply">再計算</button> <button class="btn" id="mxReset">デフォルトに戻す</button></div>';
  h+='<div id="mxRat" class="note-box plain" style="display:none"></div>';
  h+='</div></div>';
  // 感度分析結果
  h+='<h3>感度分析(重み±10pt・項目単位/偏差閾値±5%・±15%→±3%・±10%/±7%・±20%)</h3>';
  const quadHits=sens.hits.filter(x=>x.type==='quad');
  const rankHits=sens.hits.filter(x=>x.type==='rank');
  const thHits=sens.hits.filter(x=>x.type==='thresh');
  if (!quadHits.length && !thHits.length){
    h+='<div class="sens-ok">象限分類(提案類型)は重み±10pt・閾値変動の範囲で安定しています(境界条件なし)。</div>';
  } else {
    h+='<div class="note-box"><b>警告:分類が重み・閾値の変動で変化します。</b>該当市の提案類型は断定せず、境界条件を明示して扱ってください(定義書8章の運用規律)。</div>';
    quadHits.forEach(x=>{ h+='<div class="sens-hit">'+x.city+': '+wLabel(x.axis,x.key)+' を'+(x.delta>0?'+':'')+x.delta+'pt → '+x.from+' → '+x.to+'</div>'; });
    thHits.forEach(x=>{ h+='<div class="sens-hit">'+x.city+': 偏差閾値を±'+x.t1+'%/±'+x.t2+'%に変更 → '+x.from+' → '+x.to+'</div>'; });
  }
  if (rankHits.length){
    const uniq=[...new Set(rankHits.map(x=>x.dim+'軸の順位が「'+wLabel(x.axis,x.key)+' '+(x.delta>0?'+':'')+x.delta+'pt」で入替'))];
    uniq.slice(0,8).forEach(t=>{ h+='<div class="sens-hit">'+t+'</div>'; });
  } else {
    h+='<div class="sens-ok">切迫度・受入能力の市間順位は重み±10ptの範囲で安定しています。</div>';
  }
  h+='<p class="legend">感度分析の主目的は順位の確定ではなく「象限分類(提案類型)が変わる境界条件」の探索です(指示書確定事項)。③④の入力が増えるとカバレッジと安定性の評価は変わります。</p>';
  el.innerHTML=h;
  // イベント
  document.getElementById('mxApply').addEventListener('click', ()=>{
    document.querySelectorAll('input[data-w]').forEach(inp=>{
      const [ax,k]=inp.dataset.w.split('.');
      mxWeights[ax][k]=Math.max(0,parseFloat(inp.value)||0);
    });
    drawMatrix();
  });
  document.getElementById('mxReset').addEventListener('click', ()=>{ mxWeights=defaultWeightsNum(); drawMatrix(); });
  document.querySelectorAll('button[data-rat]').forEach(b=>b.addEventListener('click', ()=>{
    const box=document.getElementById('mxRat');
    box.style.display='block';
    box.innerHTML='<b>デフォルト重みの根拠('+(b.dataset.rat==='urgency'?'切迫度':'受入能力')+'/定義書8章):</b> '
      +esc(mxRationale[b.dataset.rat])+'<br><b>④シナジー:</b> '+esc(mxRationale.synergy);
  }));
  drawBubble(res);
}
function drawBubble(res){
  const holder=document.getElementById('mxNoChart');
  if (typeof Chart==='undefined'){
    holder.innerHTML='<div class="note-box plain">Chart.js(CDN)の読込に失敗したため散布図は表示できません。上の表で数値をご確認ください。</div>';
    return;
  }
  const pts=[], provPts=[];
  CITIES.forEach(c=>{
    const r=res[c.key];
    if (r.u===null||r.c===null) return;
    const p={x:r.c, y:r.u, r:8+(r.syn===null?0:r.syn/100*16), label:c.name+(r.provisional?'(暫定)':'')+(r.syn===null?'(④未入力)':'')};
    (r.provisional?provPts:pts).push(p);
  });
  const quadPlugin={id:'quadBg', beforeDraw(chart){
    const {ctx, chartArea:a, scales:{x,y}}=chart;
    const mx=x.getPixelForValue(50), my=y.getPixelForValue(50);
    ctx.save();
    ctx.strokeStyle='#D9D9D9'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(mx,a.top); ctx.lineTo(mx,a.bottom); ctx.moveTo(a.left,my); ctx.lineTo(a.right,my); ctx.stroke();
    ctx.fillStyle='#888888'; ctx.font='11px sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('制度整備伴走型', a.left+6, a.top+6);
    ctx.textAlign='right'; ctx.fillText('再建型', a.right-6, a.top+6);
    ctx.textBaseline='bottom'; ctx.fillText('予防保全・性能発注先行型', a.right-6, a.bottom-6);
    ctx.textAlign='left'; ctx.fillText('関係構築・広域文脈型', a.left+6, a.bottom-6);
    ctx.restore();
  }};
  const lblPlugin={id:'ptLabels', afterDatasetsDraw(chart){
    const {ctx}=chart;
    chart.data.datasets.forEach((ds,di)=>{
      chart.getDatasetMeta(di).data.forEach((el2,i)=>{
        ctx.save(); ctx.fillStyle='#333333'; ctx.font='bold 12px sans-serif';
        ctx.textAlign='center';
        ctx.fillText(ds.data[i].label, el2.x, el2.y - (ds.data[i].r||8) - 4);
        ctx.restore();
      });
    });
  }};
  if (mxChart) mxChart.destroy();
  mxChart = new Chart(document.getElementById('mxCanvas'), {
    type:'bubble',
    data:{datasets:[
      {label:'確定', data:pts, backgroundColor:'rgba(51,51,51,0.75)', borderColor:'#333333'},
      {label:'暫定(カバレッジ70%未満)', data:provPts, backgroundColor:'rgba(239,130,0,0.35)', borderColor:'#EF8200', borderWidth:2}
    ]},
    options:{
      responsive:true, animation:false,
      scales:{
        x:{min:0,max:100,title:{display:true,text:'受入能力(意思決定・履行の準備度)'}},
        y:{min:0,max:100,title:{display:true,text:'切迫度(持続性が損なわれるまでの猶予の乏しさ)'}}
      },
      plugins:{legend:{position:'bottom'},
        tooltip:{callbacks:{label:(ctx)=>ctx.raw.label+' 受入'+ctx.raw.x.toFixed(1)+' / 切迫'+ctx.raw.y.toFixed(1)}}}
    },
    plugins:[quadPlugin,lblPlugin]
  });
}
